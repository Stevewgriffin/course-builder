<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Builder — Compass Institute</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --navy-dark: #0d1117;
      --navy: #161b22;
      --navy-light: #1c2128;
      --gold: #c9a84c;
      --white: #e6edf3;
      --gray: #8b949e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--navy-dark); color: var(--white); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    #app { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }
    h1 { color: var(--gold); font-size: 1.8rem; letter-spacing: 0.02em; }
    h2 { color: var(--white); font-size: 1.2rem; margin-bottom: 16px; }
    h3 { color: var(--gray); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .header { text-align: center; padding: 32px 0 24px; border-bottom: 1px solid rgba(201,168,76,0.2); margin-bottom: 24px; }
    .header p { color: var(--gray); font-size: 0.95rem; margin-top: 4px; }
    .tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 0; overflow-x: auto; }
    .tab-btn { background: none; border: none; color: var(--gray); padding: 10px 18px; cursor: pointer; font-size: 0.9rem; border-bottom: 2px solid transparent; white-space: nowrap; transition: color 0.15s; }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-btn.locked { opacity: 0.4; pointer-events: none; cursor: default; }
    .tab-btn .done-mark { color: #3fb950; margin-left: 4px; font-size: 0.8rem; }
    .card { background: var(--navy); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; color: var(--gray); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .form-row input[type="text"], .form-row input[type="number"], .form-row input[type="password"], .form-row textarea { width: 100%; background: var(--navy-dark); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; color: var(--white); padding: 8px 12px; font-size: 0.95rem; outline: none; transition: border-color 0.15s; }
    .form-row input:focus, .form-row textarea:focus { border-color: var(--gold); }
    .form-row textarea { resize: vertical; min-height: 60px; }
    .form-row .hint { color: var(--gray); font-size: 0.78rem; margin-top: 4px; }
    .form-row input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--gold); }
    .form-inline { display: flex; align-items: center; gap: 10px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.15s; }
    .btn-primary { background: var(--gold); color: #0d1117; }
    .btn-primary:hover { background: #dbb95a; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: var(--white); border: 1px solid rgba(255,255,255,0.12); }
    .btn-secondary:hover { background: rgba(255,255,255,0.13); }
    .btn-danger { background: rgba(248,81,73,0.15); color: #f85149; border: 1px solid rgba(248,81,73,0.3); }
    .btn-danger:hover { background: rgba(248,81,73,0.25); }
    .btn-sm { padding: 5px 10px; font-size: 0.8rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { color: var(--gray); font-weight: 500; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.06em; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.08); text-align: left; }
    td { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
    td input[type="text"], td input[type="number"] { background: var(--navy-dark); border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; color: var(--white); padding: 5px 8px; font-size: 0.88rem; width: 100%; outline: none; }
    td input:focus { border-color: var(--gold); }
    .weight-total { font-size: 0.85rem; margin-top: 8px; }
    .weight-total.ok { color: #3fb950; }
    .weight-total.bad { color: #f85149; }
    .drop-zone { border: 2px dashed rgba(201,168,76,0.4); border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; transition: all 0.2s; }
    .drop-zone.dragover, .drop-zone:hover { border-color: #c9a84c; background: rgba(201,168,76,0.05); }
    .drop-zone p { color: var(--gray); margin-top: 8px; font-size: 0.9rem; }
    .drop-zone .icon { font-size: 2.5rem; }
    .file-list { margin-top: 16px; }
    .file-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--navy-light); border-radius: 7px; margin-bottom: 8px; }
    .file-item .fname { flex: 1; font-size: 0.9rem; }
    .file-item .fstats { color: var(--gray); font-size: 0.8rem; }
    .summary-card { background: var(--navy-light); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; padding: 14px 18px; margin-top: 16px; display: flex; gap: 32px; flex-wrap: wrap; }
    .summary-card .stat { text-align: center; }
    .summary-card .stat-val { font-size: 1.4rem; font-weight: 600; color: var(--gold); }
    .summary-card .stat-lbl { color: var(--gray); font-size: 0.78rem; margin-top: 2px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(201,168,76,0.3); border-top-color: #c9a84c; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; }
    .status-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 500; }
    .badge-idle { background: rgba(139,148,158,0.15); color: var(--gray); }
    .badge-running { background: rgba(201,168,76,0.15); color: var(--gold); }
    .badge-done { background: rgba(63,185,80,0.15); color: #3fb950; }
    .badge-error { background: rgba(248,81,73,0.15); color: #f85149; }
    .api-key-row { display: flex; gap: 8px; align-items: flex-end; }
    .api-key-row .form-row { flex: 1; margin-bottom: 0; }
    .section-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .section-pill { padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12); background: none; color: var(--gray); cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
    .section-pill.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }
    .question-card { background: var(--navy); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 18px; margin-bottom: 12px; }
    .question-card .q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .section-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; background: rgba(201,168,76,0.15); color: var(--gold); font-weight: 500; }
    .q-num { color: var(--gray); font-size: 0.8rem; }
    .question-card .q-text { font-size: 0.95rem; margin-bottom: 14px; line-height: 1.5; }
    .options-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .opt-item { display: flex; align-items: flex-start; gap: 8px; padding: 7px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.06); font-size: 0.88rem; }
    .opt-item.correct { border-color: rgba(63,185,80,0.3); background: rgba(63,185,80,0.07); }
    .opt-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); margin-top: 4px; flex-shrink: 0; }
    .opt-item.correct .opt-dot { background: #3fb950; }
    .opt-letter { color: var(--gray); font-size: 0.8rem; min-width: 18px; }
    .explain-toggle { background: none; border: none; color: var(--gray); font-size: 0.8rem; cursor: pointer; padding: 4px 0; margin-top: 10px; display: block; }
    .explain-toggle:hover { color: var(--white); }
    .explanation-box { margin-top: 8px; padding: 10px 14px; background: var(--navy-light); border-radius: 6px; font-size: 0.85rem; color: var(--gray); line-height: 1.5; border-left: 3px solid rgba(201,168,76,0.4); }
    .q-actions { margin-top: 12px; display: flex; justify-content: flex-end; }
    .edit-form { display: flex; flex-direction: column; gap: 10px; }
    .edit-form label { color: var(--gray); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; display: block; }
    .edit-form input, .edit-form textarea { width: 100%; background: var(--navy-dark); border: 1px solid rgba(255,255,255,0.12); border-radius: 5px; color: var(--white); padding: 7px 10px; font-size: 0.9rem; outline: none; }
    .edit-form input:focus, .edit-form textarea:focus { border-color: var(--gold); }
    .radio-row { display: flex; align-items: center; gap: 6px; font-size: 0.88rem; }
    .radio-row input[type="radio"] { accent-color: var(--gold); }
    .deploy-log { background: var(--navy-dark); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 14px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.82rem; max-height: 220px; overflow-y: auto; color: #8b949e; margin-top: 12px; }
    .deploy-log .log-line { margin-bottom: 3px; }
    .deploy-log .log-line.success { color: #3fb950; }
    .deploy-log .log-line.error { color: #f85149; }
    .success-panel { background: rgba(63,185,80,0.08); border: 1px solid rgba(63,185,80,0.3); border-radius: 10px; padding: 20px; margin-top: 16px; text-align: center; }
    .success-panel h3 { color: #3fb950; font-size: 1rem; margin-bottom: 8px; }
    .success-panel .url { color: var(--gold); word-break: break-all; margin: 8px 0; }
    .user-card { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--navy-light); border-radius: 8px; margin-top: 12px; }
    .user-card img { width: 36px; height: 36px; border-radius: 50%; }
    .user-card .uname { font-weight: 500; }
    .user-card .uid { color: var(--gray); font-size: 0.82rem; }
    .bottom-bar { display: flex; justify-content: flex-end; margin-top: 24px; gap: 10px; }
    .hidden { display: none; }
    .input-with-toggle { position: relative; }
    .input-with-toggle input { padding-right: 40px; }
    .toggle-vis { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--gray); cursor: pointer; font-size: 0.85rem; }
    .notice { padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 12px; }
    .notice-info { background: rgba(56,139,253,0.1); border: 1px solid rgba(56,139,253,0.3); color: #79c0ff; }
    .section-gen-row td { font-size: 0.88rem; }
    .error-msg { color: #f85149; font-size: 0.8rem; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    var state = {
      activeTab: 0,
      config: {
        title: '', subtitle: '', repoName: '', sections: [],
        totalQuestions: 100, passingPct: 70, timerMinutes: 120,
        showCalculator: false, adminPasscode: '', adminPasscodeHash: '', footer: ''
      },
      pdf: { extractedText: '', wordCount: 0, pageCount: 0, files: [] },
      questions: { all: [], generating: false, generatingSectionIdx: -1, errors: {} },
      deploy: { status: 'idle', log: [], pagesUrl: '' },
      apiKey: localStorage.getItem('cb_api_key') || '',
      githubToken: localStorage.getItem('cb_github_token') || '',
      githubUser: null,
      previewSection: 'all',
      editingQuestionId: null,
      showExplanations: {}
    };

    // ---- Utility ----
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function hashPasscode(p) {
      if (!p) return '';
      const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    // ---- PDF ----
    async function extractPDF(file) {
      const ab = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data: ab}).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(it => it.str).join(' ') + '\n\n';
        if (i % 10 === 0) await new Promise(r => setTimeout(r, 0));
      }
      const words = text.split(/\s+/).filter(Boolean).length;
      return { text, pages: pdf.numPages, words };
    }

    async function handleFiles(files) {
      for (const file of files) {
        if (!file.type.includes('pdf')) continue;
        const entry = { name: file.name, status: 'extracting', pages: 0, words: 0 };
        state.pdf.files.push(entry);
        render();
        try {
          const result = await extractPDF(file);
          entry.status = 'done';
          entry.pages = result.pages;
          entry.words = result.words;
          state.pdf.extractedText += result.text;
          state.pdf.pageCount += result.pages;
          state.pdf.wordCount += result.words;
        } catch(e) {
          entry.status = 'error';
          entry.error = e.message;
        }
        render();
      }
    }

    function clearPDFs() {
      state.pdf = { extractedText: '', wordCount: 0, pageCount: 0, files: [] };
      render();
    }

    // ---- API / Generation ----
    async function generateSection(sectionName, count, startId) {
      const prompt = `Create exactly ${count} multiple-choice questions for the section titled "${sectionName}".

The questions must be based on this educational content:
---
${state.pdf.extractedText.substring(0, 180000)}
---

Return ONLY a JSON array. No markdown. No code fences. Raw JSON only.

Each object: {"id":${startId},"section":"${sectionName}","question":"...?","options":["A","B","C","D"],"correct":0,"explanation":"..."}

Rules:
- id starts at ${startId}, increments by 1
- correct is 0-3 (vary which index), question ends with ?
- Mix recall, comprehension, application questions
- Do NOT use "all of the above" or "none of the above"

Return the JSON array now:`;

      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': state.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: Math.max(8192, count * 200),
          system: 'You are an expert educator. Respond with valid JSON only — no markdown, no code fences.',
          messages: [{role: 'user', content: prompt}]
        })
      });
      if (!resp.ok) {
        const e = await resp.json();
        throw new Error(e.error?.message || `API ${resp.status}`);
      }
      const data = await resp.json();
      let txt = data.content[0].text.trim();
      const fence = txt.match(/```(?:json)?\s*([\s\S]*?)```/);
      if (fence) txt = fence[1].trim();
      return JSON.parse(txt);
    }

    async function generateAll() {
      if (!state.apiKey) { alert('Please enter your API key first.'); return; }
      state.questions.generating = true;
      state.questions.all = [];
      state.questions.errors = {};
      render();
      for (let i = 0; i < state.config.sections.length; i++) {
        const sec = state.config.sections[i];
        state.questions.generatingSectionIdx = i;
        render();
        try {
          const startId = state.questions.all.length + 1;
          const qs = await generateSection(sec.name, parseInt(sec.total) || 10, startId);
          state.questions.all = state.questions.all.concat(qs);
        } catch(e) {
          state.questions.errors[i] = e.message;
        }
        if (i < state.config.sections.length - 1) await new Promise(r => setTimeout(r, 2000));
      }
      state.questions.generating = false;
      state.questions.generatingSectionIdx = -1;
      render();
    }

    async function retrySection(idx) {
      const sec = state.config.sections[idx];
      if (!sec) return;
      delete state.questions.errors[idx];
      state.questions.generating = true;
      state.questions.generatingSectionIdx = idx;
      render();
      try {
        const existing = state.questions.all.filter(q => q.section !== sec.name);
        const startId = existing.length + 1;
        const qs = await generateSection(sec.name, parseInt(sec.total) || 10, startId);
        state.questions.all = existing.concat(qs);
      } catch(e) {
        state.questions.errors[idx] = e.message;
      }
      state.questions.generating = false;
      state.questions.generatingSectionIdx = -1;
      render();
    }

    // ---- Tab logic ----
    function isTabDone(n) {
      if (n === 0) return !!(state.config.title && state.config.repoName && state.config.sections.length > 0);
      if (n === 1) return state.pdf.extractedText.length > 100;
      if (n === 2) return state.questions.all.length > 0;
      if (n === 3) return state.questions.all.length > 0;
      return false;
    }

    function switchTab(n) {
      if (n >= 1 && !isTabDone(0)) return;
      if (n >= 2 && !isTabDone(1)) return;
      if (n >= 3 && !isTabDone(2)) return;
      if (n >= 4 && !isTabDone(3)) return;
      state.activeTab = n;
      render();
    }

    async function configNext() {
      if (!state.config.title || !state.config.repoName || !state.config.sections.length) return;
      state.config.adminPasscodeHash = await hashPasscode(state.config.adminPasscode);
      state.activeTab = 1;
      render();
    }

    function addSection() {
      state.config.sections.push({ name: 'New Section', count: 1, total: 10, pct: '' });
      render();
    }

    function removeSection(idx) {
      state.config.sections.splice(idx, 1);
      render();
    }

    // ---- GitHub ----
    function ghHeaders(token) {
      return {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github+json',
        'X-GitHub-Api-Version': '2022-11-28'
      };
    }

    async function validateToken() {
      try {
        const r = await fetch('https://api.github.com/user', {headers: ghHeaders(state.githubToken)});
        if (!r.ok) throw new Error('Invalid token');
        state.githubUser = await r.json();
        render();
      } catch(e) {
        alert('Token validation failed: ' + e.message);
      }
    }

    async function createRepo(token, name) {
      const r = await fetch('https://api.github.com/user/repos', {
        method: 'POST',
        headers: ghHeaders(token),
        body: JSON.stringify({name, private: false, auto_init: false, description: state.config.title + ' — Test Platform'})
      });
      if (!r.ok) {
        const e = await r.json();
        if (!e.errors?.[0]?.message?.includes('already exists')) throw new Error(e.message);
      }
    }

    async function pushFile(token, user, repo, path, content) {
      let sha;
      const check = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {headers: ghHeaders(token)});
      if (check.ok) sha = (await check.json()).sha;
      const body = {message: `Add ${path}`, content: btoa(unescape(encodeURIComponent(content)))};
      if (sha) body.sha = sha;
      const r = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
        method: 'PUT',
        headers: ghHeaders(token),
        body: JSON.stringify(body)
      });
      if (!r.ok) throw new Error(`Failed ${path}: ${(await r.json()).message}`);
    }

    async function enablePages(token, user, repo) {
      const r = await fetch(`https://api.github.com/repos/${user}/${repo}/pages`, {
        method: 'POST',
        headers: ghHeaders(token),
        body: JSON.stringify({source: {branch: 'main', path: '/'}})
      });
      if (!r.ok && r.status !== 409 && r.status !== 422) {
        throw new Error('Pages failed: ' + (await r.json()).message);
      }
    }

    // ---- File builders ----
    function buildQuestionsJs() {
      const c = state.config;
      const saveKey = c.repoName.replace(/-/g, '_') + '_progress';
      const cfg = {
        title: c.title,
        subtitle: c.subtitle,
        sections: c.sections.map(s => ({name: s.name, count: parseInt(s.count), total: parseInt(s.total), pct: s.pct + '%'})),
        totalQuestions: parseInt(c.totalQuestions),
        passingPct: parseInt(c.passingPct),
        showCalculator: c.showCalculator,
        saveKey,
        defaultTimerMinutes: parseInt(c.timerMinutes),
        adminPasscodeHash: c.adminPasscodeHash || '',
        footer: c.footer || (c.title + ' — For study purposes only.')
      };
      return 'var TEST_CONFIG = ' + JSON.stringify(cfg, null, 2) + ';\n\nvar ALL_QUESTIONS = ' + JSON.stringify(state.questions.all, null, 2) + ';\n';
    }

    function buildIndexHtml(username) {
      const c = state.config;
      const url = `https://${username}.github.io/${c.repoName}/`;
      const t = c.title.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return `<!DOCTYPE html>\n<html lang="en">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">\n  <title>${t}</title>\n  <link rel="stylesheet" href="shell.css">\n</head>\n<body>\n  <div class="container" id="static-start">\n    <div class="start-screen">\n      <h1 style="color:#c9a84c;text-align:center;padding-top:60px;font-size:2rem">${t}<\/h1>\n      <p style="color:#8a93a6;text-align:center;margin-top:40px;padding:0 20px;line-height:1.6">To use this app on iPhone or iPad, open it in Safari using the link below.<\/p>\n      <p style="text-align:center;margin-top:24px"><a href="${url}" style="color:#c9a84c">${url}<\/a><\/p>\n    <\/div>\n  <\/div>\n  <div class="container hidden" id="app"><\/div>\n  <script src="questions.js"><\/script>\n  <script src="shell.js"><\/script>\n<\/body>\n<\/html>`;
    }

    // ---- Deploy ----
    function addLog(msg) {
      state.deploy.log.push(msg);
      render();
      setTimeout(() => {
        const el = document.getElementById('deploy-log');
        if (el) el.scrollTop = el.scrollHeight;
      }, 50);
    }

    async function deploy() {
      state.deploy.status = 'deploying';
      state.deploy.log = [];
      render();
      try {
        const token = state.githubToken;
        const username = state.githubUser.login;
        const repo = state.config.repoName;
        addLog('Creating GitHub repository...');
        await createRepo(token, repo);
        addLog('Fetching shell.js...');
        const shellJs = await fetch('https://raw.githubusercontent.com/Stevewgriffin/praxis5101/main/shell.js').then(r => r.text());
        addLog('Fetching shell.css...');
        const shellCss = await fetch('https://raw.githubusercontent.com/Stevewgriffin/praxis5101/main/shell.css').then(r => r.text());
        addLog('Building questions.js...');
        const qJs = buildQuestionsJs();
        addLog('Building index.html...');
        const idx = buildIndexHtml(username);
        addLog('Pushing files...');
        await pushFile(token, username, repo, 'index.html', idx);
        await pushFile(token, username, repo, 'questions.js', qJs);
        await pushFile(token, username, repo, 'shell.js', shellJs);
        await pushFile(token, username, repo, 'shell.css', shellCss);
        addLog('Enabling GitHub Pages...');
        await new Promise(r => setTimeout(r, 1500));
        await enablePages(token, username, repo);
        const url = `https://${username}.github.io/${repo}/`;
        state.deploy.pagesUrl = url;
        state.deploy.status = 'done';
        addLog('✅ Done! Deploying to: ' + url);
        addLog('GitHub Pages typically takes 1-3 minutes to go live.');
      } catch(e) {
        state.deploy.status = 'error';
        addLog('❌ Error: ' + e.message);
      }
      render();
    }

    function copyURL() {
      navigator.clipboard.writeText(state.deploy.pagesUrl).then(() => {
        const btn = document.getElementById('copy-btn');
        if (btn) {
          btn.textContent = '✓ Copied';
          setTimeout(() => {
            if (btn) btn.textContent = 'Copy URL';
          }, 2000);
        }
      });
    }

    // ---- Question edit ----
    function saveQuestion(qid) {
      const q = state.questions.all.find(q => q.id === qid);
      if (!q) return;
      q.question = document.getElementById('eq-question').value;
      q.options = [0, 1, 2, 3].map(i => document.getElementById('eq-opt-' + i).value);
      q.correct = parseInt(document.querySelector('input[name="eq-correct"]:checked')?.value || 0);
      q.explanation = document.getElementById('eq-explanation').value;
      state.editingQuestionId = null;
      render();
    }

    function togglePasswordVis(targetId) {
      const inp = document.getElementById(targetId);
      if (inp) inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    // ---- Field change handler ----
    function handleFieldChange(el) {
      const field = el.dataset.field;
      const val = el.type === 'checkbox' ? el.checked : el.value;
      if (field === 'apiKey') {
        state.apiKey = val;
        if (el.dataset.save) localStorage.setItem('cb_api_key', val);
      } else if (field === 'githubToken') {
        state.githubToken = val;
        localStorage.setItem('cb_github_token', val);
      } else if (field.startsWith('section-')) {
        const parts = field.split('-');
        const prop = parts[1];
        const sidx = parseInt(parts[2]);
        state.config.sections[sidx][prop] = val;
        // Don't re-render on every keystroke for section fields — handled by input event
      } else if (field in state.config) {
        state.config[field] = val;
        // Only re-render for checkboxes to avoid cursor jump
        if (el.type === 'checkbox') render();
      }
    }

    // ---- Render functions ----
    function renderHeader() {
      return `<div class="header">
        <h1>Course Builder</h1>
        <p>Compass Institute Test Platform</p>
      </div>`;
    }

    function renderTabs() {
      const labels = ['Config', 'PDF Upload', 'Generate', 'Preview', 'Deploy'];
      let html = '<div class="tabs">';
      for (let i = 0; i < 5; i++) {
        const isActive = state.activeTab === i;
        const isDone = isTabDone(i);
        const isLocked = (i >= 1 && !isTabDone(0)) || (i >= 2 && !isTabDone(1)) || (i >= 3 && !isTabDone(2)) || (i >= 4 && !isTabDone(3));
        const cls = [
          'tab-btn',
          isActive ? 'active' : '',
          isLocked ? 'locked' : ''
        ].filter(Boolean).join(' ');
        const done = isDone && !isActive ? '<span class="done-mark">✓</span>' : '';
        html += `<button class="${cls}" data-action="tab" data-tab="${i}">${esc(labels[i])}${done}</button>`;
      }
      html += '</div>';
      return html;
    }

    function renderConfig() {
      const c = state.config;
      const weightTotal = c.sections.reduce((s, sec) => s + (parseFloat(sec.pct) || 0), 0);
      const weightOk = Math.abs(weightTotal - 100) < 0.01 || c.sections.length === 0;
      const canNext = !!(c.title && c.repoName && c.sections.length > 0);

      let sectionsRows = '';
      c.sections.forEach((sec, i) => {
        sectionsRows += `<tr>
          <td><input type="text" data-field="section-name-${i}" value="${esc(sec.name)}" placeholder="Section name"></td>
          <td><input type="number" data-field="section-count-${i}" value="${esc(sec.count)}" min="1" style="width:60px"></td>
          <td><input type="number" data-field="section-total-${i}" value="${esc(sec.total)}" min="1" style="width:70px"></td>
          <td><input type="number" data-field="section-pct-${i}" value="${esc(sec.pct)}" min="0" max="100" step="0.1" placeholder="%" style="width:70px"></td>
          <td><button class="btn btn-danger btn-sm" data-action="remove-section" data-idx="${i}">✕</button></td>
        </tr>`;
      });

      return `<div>
        <h2>Course Configuration</h2>
        <div class="card">
          <div class="form-row">
            <label>Course Title *</label>
            <input type="text" data-field="title" value="${esc(c.title)}" placeholder="e.g. Praxis 5101 Practice Test">
          </div>
          <div class="form-row">
            <label>Subtitle</label>
            <input type="text" data-field="subtitle" value="${esc(c.subtitle)}" placeholder="e.g. Elementary Education: Multiple Subjects">
          </div>
          <div class="form-row">
            <label>GitHub Repo Name *</label>
            <input type="text" data-field="repoName" value="${esc(c.repoName)}" placeholder="e.g. praxis5101-practice">
            <div class="hint">Lowercase, hyphens only. Will be deployed to github.io/${esc(c.repoName || 'your-repo')}/</div>
          </div>
        </div>

        <div class="card">
          <h3>Sections</h3>
          <table>
            <thead>
              <tr>
                <th>Section Name</th>
                <th>Session Count</th>
                <th>Questions / Session</th>
                <th>Weight %</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${sectionsRows}</tbody>
          </table>
          <div style="margin-top:12px">
            <button class="btn btn-secondary btn-sm" data-action="add-section">+ Add Section</button>
          </div>
          ${c.sections.length > 0 ? `<div class="weight-total ${weightOk ? 'ok' : 'bad'}">Weight total: ${weightTotal.toFixed(1)}%${weightOk ? ' ✓' : ' (must equal 100%)'}</div>` : ''}
        </div>

        <div class="card">
          <h3>Test Settings</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
            <div class="form-row">
              <label>Total Questions per Session</label>
              <input type="number" data-field="totalQuestions" value="${esc(c.totalQuestions)}" min="1">
            </div>
            <div class="form-row">
              <label>Passing % </label>
              <input type="number" data-field="passingPct" value="${esc(c.passingPct)}" min="1" max="100">
            </div>
            <div class="form-row">
              <label>Timer (minutes)</label>
              <input type="number" data-field="timerMinutes" value="${esc(c.timerMinutes)}" min="1">
            </div>
          </div>
          <div class="form-row">
            <div class="form-inline">
              <input type="checkbox" data-field="showCalculator" id="calc-chk" ${c.showCalculator ? 'checked' : ''}>
              <label for="calc-chk" style="color:var(--white);font-size:0.9rem;text-transform:none;letter-spacing:0">Show calculator button</label>
            </div>
          </div>
          <div class="form-row">
            <label>Admin Passcode (optional)</label>
            <div class="input-with-toggle">
              <input type="password" data-field="adminPasscode" id="admin-pass-inp" value="${esc(c.adminPasscode)}" placeholder="Leave blank for no admin mode">
              <button class="toggle-vis" data-action="toggle-password" data-target="admin-pass-inp">👁</button>
            </div>
          </div>
          <div class="form-row">
            <label>Footer Text</label>
            <input type="text" data-field="footer" value="${esc(c.footer)}" placeholder="${esc(c.title || 'Course Title')} — For study purposes only.">
          </div>
        </div>

        <div class="bottom-bar">
          <button class="btn btn-primary" data-action="config-next" ${canNext ? '' : 'disabled'}>Next →</button>
        </div>
      </div>`;
    }

    function renderPDF() {
      const { files, wordCount, pageCount, extractedText } = state.pdf;
      const hasDone = extractedText.length > 100;

      let fileRows = '';
      files.forEach(f => {
        const icon = f.status === 'extracting'
          ? '<span class="spinner"></span>'
          : f.status === 'done'
            ? '<span style="color:#3fb950">✓</span>'
            : '<span style="color:#f85149">✕</span>';
        const stats = f.status === 'done'
          ? `<span class="fstats">${f.pages} pages · ${f.words.toLocaleString()} words</span>`
          : f.status === 'error'
            ? `<span class="fstats" style="color:#f85149">${esc(f.error)}</span>`
            : `<span class="fstats">Extracting…</span>`;
        fileRows += `<div class="file-item">${icon}<span class="fname">${esc(f.name)}</span>${stats}</div>`;
      });

      return `<div>
        <h2>PDF Upload</h2>
        <div class="notice notice-info">Upload one or more PDFs containing your course material. The text will be extracted and used to generate questions.</div>
        <label for="pdf-file-input" style="cursor:pointer">
          <div class="drop-zone" id="drop-zone">
            <div class="icon">📄</div>
            <p style="color:var(--white);font-size:1rem;margin-top:8px">Drop PDFs here or click to browse</p>
            <p>Accepts multiple PDF files</p>
          </div>
        </label>
        <input type="file" id="pdf-file-input" accept=".pdf" multiple style="display:none">

        ${files.length > 0 ? `<div class="file-list">${fileRows}</div>` : ''}

        ${hasDone ? `<div class="summary-card">
          <div class="stat"><div class="stat-val">${files.filter(f=>f.status==='done').length}</div><div class="stat-lbl">Files</div></div>
          <div class="stat"><div class="stat-val">${pageCount}</div><div class="stat-lbl">Pages</div></div>
          <div class="stat"><div class="stat-val">${wordCount.toLocaleString()}</div><div class="stat-lbl">Words</div></div>
          <div class="stat"><div class="stat-val">${Math.round(extractedText.length/1000)}K</div><div class="stat-lbl">Characters</div></div>
        </div>` : ''}

        <div class="bottom-bar">
          ${files.length > 0 ? `<button class="btn btn-secondary" data-action="clear-pdfs">Clear All</button>` : ''}
          <button class="btn btn-primary" data-action="pdf-next" ${hasDone ? '' : 'disabled'}>Next →</button>
        </div>
      </div>`;
    }

    function renderGenerate() {
      const { all, generating, generatingSectionIdx, errors } = state.questions;
      const sections = state.config.sections;

      let rows = '';
      sections.forEach((sec, i) => {
        const isRunning = generating && generatingSectionIdx === i;
        const isError = errors[i];
        const secQs = all.filter(q => q.section === sec.name);
        const isDone = secQs.length > 0;
        const target = parseInt(sec.total) || 10;

        let statusCell;
        if (isRunning) {
          statusCell = `<span class="spinner"></span> <span style="color:var(--gold);font-size:0.82rem">Generating…</span>`;
        } else if (isError) {
          statusCell = `<span class="status-badge badge-error">Error</span>`;
        } else if (isDone) {
          statusCell = `<span class="status-badge badge-done">${secQs.length} / ${target}</span>`;
        } else {
          statusCell = `<span class="status-badge badge-idle">Pending</span>`;
        }

        rows += `<tr class="section-gen-row">
          <td>${esc(sec.name)}</td>
          <td style="text-align:center">${target}</td>
          <td>${statusCell}</td>
          <td>${isError ? `<div class="error-msg">${esc(isError)}</div><button class="btn btn-secondary btn-sm" data-action="retry-section" data-idx="${i}">Retry</button>` : ''}</td>
        </tr>`;
      });

      const canGenerate = !generating && state.apiKey;
      const doneCount = Object.values(errors).length === 0 && all.length > 0;

      return `<div>
        <h2>Generate Questions</h2>

        <div class="card">
          <h3>Anthropic API Key</h3>
          <div class="api-key-row">
            <div class="form-row" style="flex:1;margin-bottom:0">
              <div class="input-with-toggle">
                <input type="password" id="api-key-inp" data-field="apiKey" data-save="1" value="${esc(state.apiKey)}" placeholder="sk-ant-...">
                <button class="toggle-vis" data-action="toggle-password" data-target="api-key-inp">👁</button>
              </div>
            </div>
          </div>
          <div class="hint" style="margin-top:6px">Stored in localStorage. Never transmitted except to api.anthropic.com.</div>
        </div>

        <div class="card">
          <h3>Sections</h3>
          <table>
            <thead>
              <tr>
                <th>Section</th>
                <th style="text-align:center">Questions</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
          <div style="margin-top:16px;display:flex;gap:10px;align-items:center">
            <button class="btn btn-primary" data-action="generate-all" ${canGenerate ? '' : 'disabled'}>
              ${generating ? '<span class="spinner"></span> Generating…' : '⚡ Generate All'}
            </button>
            ${all.length > 0 ? `<span style="color:var(--gray);font-size:0.85rem">${all.length} questions generated</span>` : ''}
          </div>
        </div>

        <div class="bottom-bar">
          <button class="btn btn-primary" data-action="generate-next" ${all.length > 0 ? '' : 'disabled'}>Next →</button>
        </div>
      </div>`;
    }

    function renderPreview() {
      const { all } = state.questions;
      const sections = ['all', ...new Set(all.map(q => q.section))];
      const filtered = state.previewSection === 'all' ? all : all.filter(q => q.section === state.previewSection);

      let pills = sections.map(s => {
        const isActive = state.previewSection === s;
        const label = s === 'all' ? `All (${all.length})` : s;
        return `<button class="section-pill ${isActive ? 'active' : ''}" data-action="preview-section" data-section="${esc(s)}">${esc(label)}</button>`;
      }).join('');

      let cards = '';
      filtered.forEach(q => {
        if (state.editingQuestionId === q.id) {
          cards += `<div class="question-card">
            <div class="edit-form">
              <div>
                <label>Question</label>
                <textarea id="eq-question" rows="3">${esc(q.question)}</textarea>
              </div>
              ${[0,1,2,3].map(i => `<div>
                <label>Option ${String.fromCharCode(65+i)}</label>
                <input type="text" id="eq-opt-${i}" value="${esc(q.options[i] || '')}">
              </div>`).join('')}
              <div>
                <label>Correct Answer</label>
                <div style="display:flex;gap:16px;flex-wrap:wrap">
                  ${[0,1,2,3].map(i => `<label class="radio-row"><input type="radio" name="eq-correct" value="${i}" ${q.correct === i ? 'checked' : ''}> ${String.fromCharCode(65+i)}</label>`).join('')}
                </div>
              </div>
              <div>
                <label>Explanation</label>
                <textarea id="eq-explanation" rows="3">${esc(q.explanation || '')}</textarea>
              </div>
              <div style="display:flex;gap:8px;justify-content:flex-end">
                <button class="btn btn-secondary btn-sm" data-action="cancel-edit">Cancel</button>
                <button class="btn btn-primary btn-sm" data-action="save-question" data-qid="${q.id}">Save</button>
              </div>
            </div>
          </div>`;
        } else {
          const optLetters = ['A','B','C','D'];
          let opts = q.options.map((opt, i) => `
            <li class="opt-item ${q.correct === i ? 'correct' : ''}">
              <span class="opt-dot"></span>
              <span class="opt-letter">${optLetters[i]}.</span>
              <span>${esc(opt)}</span>
            </li>`).join('');

          const showExp = state.showExplanations[q.id];

          cards += `<div class="question-card">
            <div class="q-header">
              <span class="q-num">#${q.id}</span>
              <span class="section-badge">${esc(q.section)}</span>
            </div>
            <div class="q-text">${esc(q.question)}</div>
            <ul class="options-list">${opts}</ul>
            ${q.explanation ? `<button class="explain-toggle" data-action="toggle-explain" data-qid="${q.id}">${showExp ? '▲ Hide explanation' : '▼ Show explanation'}</button>
            ${showExp ? `<div class="explanation-box">${esc(q.explanation)}</div>` : ''}` : ''}
            <div class="q-actions">
              <button class="btn btn-secondary btn-sm" data-action="edit-question" data-qid="${q.id}">Edit</button>
            </div>
          </div>`;
        }
      });

      return `<div>
        <h2>Preview Questions</h2>
        <div class="section-tabs">${pills}</div>
        <div style="max-height:600px;overflow-y:auto;padding-right:4px">${cards || '<p style="color:var(--gray);text-align:center;padding:40px">No questions found.</p>'}</div>
        <div class="bottom-bar">
          <button class="btn btn-primary" data-action="preview-next">Next →</button>
        </div>
      </div>`;
    }

    function renderDeploy() {
      const { status, log, pagesUrl } = state.deploy;
      const isDeploying = status === 'deploying';
      const isDone = status === 'done';

      let logLines = '';
      log.forEach(line => {
        const cls = line.includes('✅') ? 'success' : line.includes('❌') ? 'error' : '';
        logLines += `<div class="log-line ${cls}">${esc(line)}</div>`;
      });

      const userCard = state.githubUser ? `<div class="user-card">
        <img src="${esc(state.githubUser.avatar_url)}" alt="">
        <div>
          <div class="uname">${esc(state.githubUser.name || state.githubUser.login)}</div>
          <div class="uid">@${esc(state.githubUser.login)}</div>
        </div>
        <span class="status-badge badge-done">Validated</span>
      </div>` : '';

      return `<div>
        <h2>Deploy to GitHub Pages</h2>
        <div class="card">
          <h3>GitHub Personal Access Token</h3>
          <div class="form-row">
            <div class="input-with-toggle">
              <input type="password" id="gh-token-inp" data-field="githubToken" value="${esc(state.githubToken)}" placeholder="ghp_...">
              <button class="toggle-vis" data-action="toggle-password" data-target="gh-token-inp">👁</button>
            </div>
            <div class="hint">Requires: repo, pages scopes. Stored in localStorage.</div>
          </div>
          <button class="btn btn-secondary btn-sm" data-action="validate-token">Validate Token</button>
          ${userCard}
        </div>

        <div class="card">
          <h3>Deploy</h3>
          <p style="color:var(--gray);font-size:0.88rem;margin-bottom:14px">This will create a GitHub repo named <strong style="color:var(--white)">${esc(state.config.repoName)}</strong>, push all files, and enable GitHub Pages.</p>
          <button class="btn btn-primary" data-action="deploy" ${(isDeploying || !state.githubUser) ? 'disabled' : ''}>
            ${isDeploying ? '<span class="spinner"></span> Deploying…' : '🚀 Deploy'}
          </button>

          ${log.length > 0 ? `<div class="deploy-log" id="deploy-log">${logLines}</div>` : ''}

          ${isDone ? `<div class="success-panel">
            <h3>🎉 Deployment Complete!</h3>
            <div class="url">${esc(pagesUrl)}</div>
            <p style="color:var(--gray);font-size:0.82rem;margin-bottom:12px">GitHub Pages may take 1-3 minutes to go live.</p>
            <div style="display:flex;gap:8px;justify-content:center">
              <a href="${esc(pagesUrl)}" target="_blank" class="btn btn-secondary btn-sm">Open Site</a>
              <button class="btn btn-primary btn-sm" id="copy-btn" data-action="copy-url">Copy URL</button>
            </div>
          </div>` : ''}
        </div>
      </div>`;
    }

    // ---- Main render ----
    function render() {
      const app = document.getElementById('app');
      if (!app) return;

      let content = '';
      switch(state.activeTab) {
        case 0: content = renderConfig(); break;
        case 1: content = renderPDF(); break;
        case 2: content = renderGenerate(); break;
        case 3: content = renderPreview(); break;
        case 4: content = renderDeploy(); break;
      }

      app.innerHTML = renderHeader() + renderTabs() + content;

      // Restore file input listener
      const fileInput = document.getElementById('pdf-file-input');
      if (fileInput) {
        fileInput.addEventListener('change', function() { handleFiles(this.files); });
      }
    }

    // ---- Event delegation ----
    document.addEventListener('click', function(e) {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const action = el.dataset.action;
      const idx = el.dataset.idx !== undefined ? parseInt(el.dataset.idx) : null;
      switch(action) {
        case 'tab': switchTab(parseInt(el.dataset.tab)); break;
        case 'add-section': addSection(); break;
        case 'remove-section': removeSection(idx); break;
        case 'config-next': configNext(); break;
        case 'clear-pdfs': clearPDFs(); break;
        case 'pdf-next': switchTab(2); break;
        case 'generate-all': generateAll(); break;
        case 'retry-section': retrySection(idx); break;
        case 'generate-next': switchTab(3); break;
        case 'preview-section': state.previewSection = el.dataset.section; render(); break;
        case 'toggle-explain': {
          const qid = parseInt(el.dataset.qid);
          state.showExplanations[qid] = !state.showExplanations[qid];
          render();
          break;
        }
        case 'edit-question': state.editingQuestionId = parseInt(el.dataset.qid); render(); break;
        case 'save-question': saveQuestion(parseInt(el.dataset.qid)); break;
        case 'cancel-edit': state.editingQuestionId = null; render(); break;
        case 'preview-next': switchTab(4); break;
        case 'validate-token': validateToken(); break;
        case 'deploy': deploy(); break;
        case 'copy-url': copyURL(); break;
        case 'toggle-password': togglePasswordVis(el.dataset.target); break;
      }
    });

    document.addEventListener('change', function(e) {
      const el = e.target;
      if (el.type === 'file') { handleFiles(el.files); return; }
      if (el.dataset.field) handleFieldChange(el);
    });

    document.addEventListener('input', function(e) {
      const el = e.target;
      if (el.dataset.field) handleFieldChange(el);
    });

    document.addEventListener('dragover', function(e) {
      e.preventDefault();
      const z = document.getElementById('drop-zone');
      if (z) z.classList.add('dragover');
    });

    document.addEventListener('dragleave', function(e) {
      const z = document.getElementById('drop-zone');
      if (z) z.classList.remove('dragover');
    });

    document.addEventListener('drop', function(e) {
      e.preventDefault();
      const z = document.getElementById('drop-zone');
      if (z) z.classList.remove('dragover');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
      if (files.length) handleFiles(files);
    });

    // ---- Init ----
    document.addEventListener('DOMContentLoaded', function() {
      render();
    });
  </script>
</body>
</html>
